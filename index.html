<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quarteto Tenístico | Site Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #1B5E20 0%, #2E7D32 30%, #D4A373 100%);
            position: relative;
        }
        
        /* Textura de saibro sutil */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 30%, rgba(100, 50, 20, 0.15) 1px, transparent 1px);
            background-size: 35px 35px;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 90px 16px;
            position: relative;
            z-index: 2;
        }
        
        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 3px solid #F5A623;
        }
        
        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 5px;
        }
        
        .header h1 {
            font-family: 'Anton', sans-serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: #F5A623;
        }
        
        .header .sub {
            font-family: 'Roboto', sans-serif;
            font-size: 0.7rem;
            color: #CCC;
            margin-top: 5px;
        }
        
        /* Próximo Duelo Card */
        .next-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid #F5A623;
            text-align: center;
        }
        
        .next-title {
            font-family: 'Anton', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #F5A623;
            margin-bottom: 12px;
        }
        
        .next-players {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .next-player {
            text-align: center;
            background: rgba(255,255,255,0.08);
            padding: 10px 15px;
            border-radius: 8px;
            min-width: 100px;
        }
        
        .next-player-img {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            border: 1px solid #F5A623;
            object-fit: cover;
        }
        
        .next-player-name {
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .vs-divider {
            font-family: 'Anton', sans-serif;
            font-size: 1rem;
            color: #F5A623;
        }
        
        .match-date {
            margin-top: 12px;
            padding: 8px;
            background: rgba(245,166,35,0.15);
            border-radius: 6px;
            font-size: 0.7rem;
            color: #F5A623;
        }
        
        .match-status {
            margin-top: 8px;
            font-size: 0.65rem;
            color: #AAA;
        }
        
        /* Cards Gerais */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-weight: 700;
            color: #C0392B;
            margin-bottom: 14px;
            border-left: 3px solid #F5A623;
            padding-left: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #DDD;
            margin-bottom: 10px;
            font-family: 'Roboto', sans-serif;
        }
        
        button {
            background: #F5A623;
            border: none;
            padding: 10px;
            border-radius: 6px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-family: 'Roboto', sans-serif;
            transition: all 0.2s;
        }
        
        button:active { transform: scale(0.97); background: #E67E22; }
        .btn-outline { background: transparent; border: 1px solid #F5A623; color: #F5A623; }
        .btn-danger { background: #C0392B; }
        
        .player-item {
            background: #F5F5F5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .player-photo {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            margin-right: 10px;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #EEE;
            font-size: 0.85rem;
        }
        
        .score-set { text-align: center; margin: 10px 0; }
        .score-input { width: 55px; text-align: center; margin: 0 3px; padding: 8px; border-radius: 6px; }
        
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 1px solid #F5A623;
        }
        
        .menu-btn {
            background: transparent;
            border: none;
            color: #AAA;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 8px;
            font-family: 'Roboto', sans-serif;
        }
        
        .menu-btn.active { color: #F5A623; }
        .menu-btn i { font-size: 1.1rem; display: block; margin-bottom: 4px; }
        
        .hidden { display: none; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C2C2C;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }
        
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .photo-preview {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            object-fit: cover;
            margin: 5px 0;
            border: 1px solid #F5A623;
        }
        
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="quarteto tenistico.png" class="logo-img" onerror="this.style.display='none'">
        <h1>QUARTETO TENÍSTICO</h1>
        <div class="sub">SENDO RUIM EM MAIS UM ESPORTE</div>
    </div>

    <!-- PRÓXIMO DUELO -->
    <div class="next-card">
        <div class="next-title">🎾 PRÓXIMO DUELO</div>
        <div id="nextPlayers" class="next-players">
            <div class="next-player">
                <div class="next-player-img"><i class="fas fa-user" style="color:#888;"></i></div>
                <div class="next-player-name">Aguardando</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="next-player">
                <div class="next-player-img"><i class="fas fa-user" style="color:#888;"></i></div>
                <div class="next-player-name">Aguardando</div>
            </div>
        </div>
        <div id="matchDateDisplay" class="match-date"></div>
        <div id="matchStatus" class="match-status"></div>
    </div>

    <!-- HOME -->
    <div id="homeTab">
        <div class="card">
            <div class="card-title"><i class="fas fa-skull"></i> PERDEDOR DA RODADA</div>
            <select id="loserSelect"></select>
            <button id="addLoserBtn">💀 HOSTILIZAR</button>
            <div id="loserList" style="margin-top: 12px;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-check-circle"></i> CHECK-IN</div>
            <select id="checkinSelect"></select>
            <input type="date" id="checkinDate">
            <button id="checkinBtn">✅ CONFIRMAR PRESENÇA</button>
            <div id="checkinList" style="margin-top: 12px; max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- PLACAR -->
    <div id="placarTab" class="hidden">
        <div class="card">
            <div class="card-title">REGISTRAR PARTIDA</div>
            <select id="matchType">
                <option value="simples">SIMPLES (2 JOGADORES)</option>
                <option value="duplas">DUPLAS (4 JOGADORES)</option>
            </select>
            
            <div id="simplesArea">
                <select id="player1"></select>
                <select id="player2"></select>
            </div>
            
            <div id="duplasArea" class="hidden">
                <select id="dupla1"></select>
                <select id="dupla2"></select>
                <select id="dupla3"></select>
                <select id="dupla4"></select>
            </div>
            
            <div class="score-set">1º SET: <input type="number" id="set1a" class="score-input" min="0" max="7"> x <input type="number" id="set1b" class="score-input" min="0" max="7"></div>
            <div class="score-set">2º SET: <input type="number" id="set2a" class="score-input" min="0" max="7"> x <input type="number" id="set2b" class="score-input" min="0" max="7"></div>
            <div class="score-set">3º SET: <input type="number" id="set3a" class="score-input" min="0" max="7"> x <input type="number" id="set3b" class="score-input" min="0" max="7"></div>
            
            <button id="saveMatchBtn">SALVAR PARTIDA</button>
        </div>
        
        <div class="card">
            <div class="card-title">EXCLUIR RESULTADO</div>
            <select id="deleteMatchSelect"></select>
            <button id="deleteMatchBtn" class="btn-outline">EXCLUIR PARTIDA</button>
        </div>
        
        <div class="card">
            <div class="card-title">ÚLTIMAS PARTIDAS</div>
            <div id="recentMatches" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- RANKING -->
    <div id="rankingTab" class="hidden">
        <div class="card">
            <div class="card-title">🏆 RANKING SIMPLES</div>
            <div id="rankSimples"></div>
        </div>
        <div class="card">
            <div class="card-title">👥 RANKING DUPLAS</div>
            <div id="rankDuplas"></div>
        </div>
    </div>

    <!-- ADMIN -->
    <div id="adminTab" class="hidden">
        <div class="card">
            <div class="card-title">ADICIONAR JOGADOR</div>
            <input type="text" id="playerName" placeholder="Nome completo">
            <input type="file" id="playerPhotoFile" accept="image/*">
            <div id="photoPreview"></div>
            <button id="addPlayerBtn">ADICIONAR JOGADOR COM FOTO</button>
        </div>
        
        <div class="card">
            <div class="card-title">REMOVER JOGADOR</div>
            <select id="removePlayerSelect"></select>
            <button id="removePlayerBtn" class="btn-outline">REMOVER JOGADOR</button>
        </div>
        
        <div class="card">
            <div class="card-title">MEMBROS DO CLUBE</div>
            <div id="membersList" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="bottom-menu">
        <button class="menu-btn active" data-tab="homeTab"><i class="fas fa-home"></i><span>Início</span></button>
        <button class="menu-btn" data-tab="placarTab"><i class="fas fa-chalkboard"></i><span>Placar</span></button>
        <button class="menu-btn" data-tab="rankingTab"><i class="fas fa-trophy"></i><span>Ranking</span></button>
        <button class="menu-btn" data-tab="adminTab"><i class="fas fa-crown"></i><span>Admin</span></button>
    </div>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyC1HCA84bAsQWsf1y0c85gXZ2_Jn6_syaU",
    authDomain: "quartetotenistico-9c9ab.firebaseapp.com",
    databaseURL: "https://quartetotenistico-9c9ab-default-rtdb.firebaseio.com",
    projectId: "quartetotenistico-9c9ab",
    storageBucket: "quartetotenistico-9c9ab.firebasestorage.app",
    messagingSenderId: "791700433774",
    appId: "1:791700433774:web:ea08cc0ad6c1cc045fef7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let players = [];
let matches = [];
let checkins = [];
let losers = [];

function showToast(msg) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// CARREGAR JOGADORES
async function loadPlayers() {
    const snapshot = await db.ref('players').once('value');
    players = [];
    snapshot.forEach(child => { players.push({ id: child.key, ...child.val() }); });
    players.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
    
    const selects = ['player1','player2','dupla1','dupla2','dupla3','dupla4','checkinSelect','loserSelect','removePlayerSelect','deleteMatchSelect'];
    selects.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.innerHTML = '<option value="">Selecione</option>' + players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    });
    
    document.getElementById('membersList').innerHTML = players.map(p => `
        <div class="player-item">
            <div class="flex-row">
                <img src="${p.photoUrl || 'https://via.placeholder.com/40'}" class="player-photo" onerror="this.src='https://via.placeholder.com/40'">
                <span><strong>${p.name}</strong></span>
            </div>
        </div>
    `).join('') || '<div style="text-align:center; padding:20px;">Nenhum jogador</div>';
}

// CARREGAR PARTIDAS
async function loadMatches() {
    const snapshot = await db.ref('matches').once('value');
    matches = [];
    snapshot.forEach(child => { matches.push({ id: child.key, ...child.val() }); });
    matches.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
    
    // Ranking Simples
    const stats = {};
    players.forEach(p => stats[p.id] = { jogos: 0, vitorias: 0 });
    matches.forEach(m => {
        if(m.winners) m.winners.forEach(w => { if(stats[w]) { stats[w].jogos++; stats[w].vitorias++; } });
        if(m.losers) m.losers.forEach(l => { if(stats[l]) stats[l].jogos++; });
    });
    const sorted = Object.entries(stats).sort((a,b) => b[1].vitorias - a[1].vitorias);
    document.getElementById('rankSimples').innerHTML = sorted.map(([id,s]) => {
        const p = players.find(p => p.id === id);
        const perc = s.jogos > 0 ? ((s.vitorias/s.jogos)*100).toFixed(0) : 0;
        return `<div class="ranking-item"><span><strong>${p?.name || '?'}</strong></span><span>🏆 ${s.vitorias}V / ${s.jogos-s.vitorias}D (${perc}%)</span></div>`;
    }).join('') || '<div style="text-align:center; padding:20px;">Nenhuma partida</div>';
    
    // Ranking Duplas
    const duplaWins = {};
    matches.forEach(m => {
        if(m.type === 'duplas' && m.winners && m.winners.length === 2) {
            const key = [m.winners[0], m.winners[1]].sort().join('_');
            duplaWins[key] = (duplaWins[key] || 0) + 1;
        }
    });
    document.getElementById('rankDuplas').innerHTML = Object.entries(duplaWins).sort((a,b) => b[1] - a[1]).map(([key,w]) => {
        const ids = key.split('_');
        const p1 = players.find(p => p.id === ids[0]);
        const p2 = players.find(p => p.id === ids[1]);
        return `<div class="ranking-item"><span>${p1?.name || '?'} / ${p2?.name || '?'}</span><span>🏆 ${w}</span></div>`;
    }).join('') || '<div style="text-align:center; padding:20px;">Nenhuma dupla</div>';
    
    // Recentes
    document.getElementById('recentMatches').innerHTML = matches.slice(0, 15).map(m => {
        const winners = m.winners?.map(w => players.find(p => p.id === w)?.name).join('/') || '?';
        const losers = m.losers?.map(l => players.find(p => p.id === l)?.name).join('/') || '?';
        const date = m.date ? new Date(m.date).toLocaleDateString() : 'Data?';
        return `<div class="player-item"><span><strong>${winners}</strong> venceu <strong>${losers}</strong></span><span style="font-size:0.65rem;">${date}</span></div>`;
    }).join('') || '<div style="text-align:center; padding:20px;">Nenhuma partida</div>';
    
    // Delete Select
    document.getElementById('deleteMatchSelect').innerHTML = '<option value="">Selecione</option>' + matches.slice(0, 30).map(m => {
        const winners = m.winners?.map(w => players.find(p => p.id === w)?.name).join('/');
        const losers = m.losers?.map(l => players.find(p => p.id === l)?.name).join('/');
        const date = m.date ? new Date(m.date).toLocaleDateString() : '';
        return `<option value="${m.id}">${date} - ${winners} x ${losers}</option>`;
    }).join('');
}

// CARREGAR CHECKINS E PRÓXIMO DUELO
async function loadCheckins() {
    const snapshot = await db.ref('checkins').once('value');
    checkins = [];
    snapshot.forEach(child => { checkins.push(child.val()); });
    
    const hoje = new Date().toDateString();
    const checkinsHoje = checkins.filter(c => c.date && new Date(c.date).toDateString() === hoje);
    const idsHoje = checkinsHoje.map(c => c.playerId);
    const confirmados = players.filter(p => idsHoje.includes(p.id));
    
    // Atualizar próximo duelo
    const container = document.getElementById('nextPlayers');
    const dateDiv = document.getElementById('matchDateDisplay');
    const statusDiv = document.getElementById('matchStatus');
    
    if(checkinsHoje.length > 0 && checkinsHoje[0].date) {
        dateDiv.innerHTML = `📅 DATA DO DUELO: ${new Date(checkinsHoje[0].date).toLocaleDateString('pt-BR')}`;
    } else {
        dateDiv.innerHTML = '';
    }
    
    if(confirmados.length >= 2) {
        const p1 = confirmados[0], p2 = confirmados[1];
        container.innerHTML = `
            <div class="next-player">
                <img src="${p1.photoUrl || 'https://via.placeholder.com/55'}" class="next-player-img" onerror="this.src='https://via.placeholder.com/55'">
                <div class="next-player-name">${p1.name}</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="next-player">
                <img src="${p2.photoUrl || 'https://via.placeholder.com/55'}" class="next-player-img" onerror="this.src='https://via.placeholder.com/55'">
                <div class="next-player-name">${p2.name}</div>
            </div>
        `;
        statusDiv.innerHTML = `✅ ${confirmados.length} jogadores confirmados`;
    } else {
        container.innerHTML = `
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user" style="color:#888;"></i></div><div class="next-player-name">Aguardando</div></div>
            <div class="vs-divider">VS</div>
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user" style="color:#888;"></i></div><div class="next-player-name">Aguardando</div></div>
        `;
        statusDiv.innerHTML = `⏳ Aguardando check-ins (${confirmados.length}/2)`;
    }
    
    // Lista de check-ins
    document.getElementById('checkinList').innerHTML = checkins.slice(0, 10).map(c => {
        const p = players.find(p => p.id === c.playerId);
        const data = c.date ? new Date(c.date).toLocaleDateString() : 'Data?';
        return `<div class="player-item">📅 ${data} - ${p?.name || '?'}</div>`;
    }).join('') || '<div style="text-align:center;">Nenhum check-in</div>';
}

// CARREGAR PERDEDORES
async function loadLosers() {
    const snapshot = await db.ref('losers').once('value');
    losers = [];
    snapshot.forEach(child => { losers.push({ id: child.key, ...child.val() }); });
    
    const count = {};
    losers.forEach(l => { count[l.playerId] = (count[l.playerId] || 0) + 1; });
    const sorted = Object.entries(count).sort((a,b) => b[1] - a[1]).slice(0,5);
    document.getElementById('loserList').innerHTML = sorted.map(([id,c]) => {
        const p = players.find(p => p.id === id);
        return `<div class="player-item">💀 ${p?.name || '?'} - 🍂 ${c} vez(es)</div>`;
    }).join('') || '<div style="text-align:center;">Nenhum perdedor</div>';
}

// ADICIONAR JOGADOR COM FOTO
async function addPlayer() {
    const name = document.getElementById('playerName').value.trim();
    const file = document.getElementById('playerPhotoFile').files[0];
    
    if(!name) { showToast('Digite o nome do jogador'); return; }
    
    showToast('Adicionando jogador...');
    
    try {
        let photoUrl = null;
        if(file) {
            const storageRef = storage.ref(`players/${Date.now()}_${file.name}`);
            await storageRef.put(file);
            photoUrl = await storageRef.getDownloadURL();
        }
        
        await db.ref('players').push({
            name: name,
            photoUrl: photoUrl,
            createdAt: new Date().toISOString()
        });
        
        showToast(`✅ Jogador ${name} adicionado!`);
        document.getElementById('playerName').value = '';
        document.getElementById('playerPhotoFile').value = '';
        document.getElementById('photoPreview').innerHTML = '';
        await loadPlayers();
    } catch (error) {
        showToast('Erro: ' + error.message);
    }
}

// REMOVER JOGADOR
async function removePlayer() {
    const id = document.getElementById('removePlayerSelect').value;
    if(!id) { showToast('Selecione um jogador'); return; }
    try {
        await db.ref(`players/${id}`).remove();
        showToast('✅ Jogador removido');
        await loadPlayers();
    } catch (error) { showToast('Erro: ' + error.message); }
}

// HOSTILIZAR PERDEDOR
async function addLoser() {
    const id = document.getElementById('loserSelect').value;
    if(!id) { showToast('Selecione o perdedor'); return; }
    try {
        await db.ref('losers').push({ playerId: id, timestamp: Date.now() });
        showToast('💀 Perdedor hostilizado!');
        await loadLosers();
    } catch (error) { showToast('Erro: ' + error.message); }
}

// CHECK-IN
async function doCheckin() {
    const id = document.getElementById('checkinSelect').value;
    const date = document.getElementById('checkinDate').value;
    if(!id) { showToast('Selecione um jogador'); return; }
    if(!date) { showToast('Selecione a data do duelo'); return; }
    try {
        await db.ref('checkins').push({ playerId: id, date: date, timestamp: Date.now() });
        showToast(`✅ Check-in para ${new Date(date).toLocaleDateString()}`);
        await loadCheckins();
    } catch (error) { showToast('Erro: ' + error.message); }
}

// SALVAR PARTIDA
async function saveMatch() {
    const type = document.getElementById('matchType').value;
    let winners = [], losers = [];
    
    if(type === 'simples') {
        const p1 = document.getElementById('player1').value;
        const p2 = document.getElementById('player2').value;
        if(!p1 || !p2) { showToast('Selecione os jogadores'); return; }
        if(p1 === p2) { showToast('Jogadores diferentes'); return; }
        
        const s1a = parseInt(document.getElementById('set1a').value) || 0;
        const s1b = parseInt(document.getElementById('set1b').value) || 0;
        const s2a = parseInt(document.getElementById('set2a').value) || 0;
        const s2b = parseInt(document.getElementById('set2b').value) || 0;
        const s3a = parseInt(document.getElementById('set3a').value) || 0;
        const s3b = parseInt(document.getElementById('set3b').value) || 0;
        
        let setsP1 = 0, setsP2 = 0;
        if(s1a > s1b) setsP1++; else if(s1b > s1a) setsP2++;
        if(s2a > s2b) setsP1++; else if(s2b > s2a) setsP2++;
        if(s3a > s3b) setsP1++; else if(s3b > s3a) setsP2++;
        
        if(setsP1 > setsP2) { winners = [p1]; losers = [p2]; }
        else if(setsP2 > setsP1) { winners = [p2]; losers = [p1]; }
        else { showToast('Empate! Verifique os sets'); return; }
    } else {
        const a1 = document.getElementById('dupla1').value;
        const a2 = document.getElementById('dupla2').value;
        const b1 = document.getElementById('dupla3').value;
        const b2 = document.getElementById('dupla4').value;
        if(!a1 || !a2 || !b1 || !b2) { showToast('Selecione todos os 4 jogadores'); return; }
        
        const s1a = parseInt(document.getElementById('set1a').value) || 0;
        const s1b = parseInt(document.getElementById('set1b').value) || 0;
        const s2a = parseInt(document.getElementById('set2a').value) || 0;
        const s2b = parseInt(document.getElementById('set2b').value) || 0;
        const s3a = parseInt(document.getElementById('set3a').value) || 0;
        const s3b = parseInt(document.getElementById('set3b').value) || 0;
        
        let setsA = 0, setsB = 0;
        if(s1a > s1b) setsA++; else if(s1b > s1a) setsB++;
        if(s2a > s2b) setsA++; else if(s2b > s2a) setsB++;
        if(s3a > s3b) setsA++; else if(s3b > s3a) setsB++;
        
        if(setsA > setsB) { winners = [a1, a2]; losers = [b1, b2]; }
        else if(setsB > setsA) { winners = [b1, b2]; losers = [a1, a2]; }
        else { showToast('Empate!'); return; }
    }
    
    try {
        await db.ref('matches').push({
            type: type,
            winners: winners,
            losers: losers,
            date: new Date().toISOString(),
            timestamp: Date.now()
        });
        showToast('🎾 Partida registrada!');
        
        document.getElementById('set1a').value = '';
        document.getElementById('set1b').value = '';
        document.getElementById('set2a').value = '';
        document.getElementById('set2b').value = '';
        document.getElementById('set3a').value = '';
        document.getElementById('set3b').value = '';
        
        await loadMatches();
    } catch (error) { showToast('Erro: ' + error.message); }
}

// EXCLUIR PARTIDA
async function deleteMatch() {
    const id = document.getElementById('deleteMatchSelect').value;
    if(!id) { showToast('Selecione uma partida'); return; }
    try {
        await db.ref(`matches/${id}`).remove();
        showToast('✅ Partida excluída');
        await loadMatches();
    } catch (error) { showToast('Erro: ' + error.message); }
}

// PREVIEW DA FOTO
document.getElementById('playerPhotoFile').addEventListener('change', (e) => {
    if(e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('photoPreview').innerHTML = `<img src="${ev.target.result}" class="photo-preview">`;
        };
        reader.readAsDataURL(e.target.files[0]);
    }
});

// TABS
function setupTabs() {
    const btns = document.querySelectorAll('.menu-btn');
    btns.forEach(btn => {
        btn.onclick = () => {
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            ['homeTab', 'placarTab', 'rankingTab', 'adminTab'].forEach(t => {
                document.getElementById(t).classList.add('hidden');
            });
            document.getElementById(btn.dataset.tab).classList.remove('hidden');
        };
    });
}

// EVENTOS
document.getElementById('addPlayerBtn').onclick = addPlayer;
document.getElementById('removePlayerBtn').onclick = removePlayer;
document.getElementById('addLoserBtn').onclick = addLoser;
document.getElementById('checkinBtn').onclick = doCheckin;
document.getElementById('saveMatchBtn').onclick = saveMatch;
document.getElementById('deleteMatchBtn').onclick = deleteMatch;
document.getElementById('matchType').onchange = () => {
    const isDuplas = document.getElementById('matchType').value === 'duplas';
    document.getElementById('simplesArea').classList.toggle('hidden', isDuplas);
    document.getElementById('duplasArea').classList.toggle('hidden', !isDuplas);
};
document.getElementById('checkinDate').valueAsDate = new Date();

// INICIALIZAÇÃO
setupTabs();
loadPlayers();
loadMatches();
loadCheckins();
loadLosers();
</script>
