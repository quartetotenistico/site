<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#C74B1E">
    <title>Quarteto Tenístico | Roland Garros Style</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="quarteto-tenistico.png">
    <!-- Fontes oficiais Roland Garros -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, getDocs, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        
        // 🔥 SUBSTITUA PELAS SUAS CREDENCIAIS DO FIREBASE
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_AUTH_DOMAIN",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_STORAGE_BUCKET",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        window.db = db;
        window.storage = storage;
        window.addDoc = addDoc;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.where = where;
        window.ref = ref;
        window.uploadBytes = uploadBytes;
        window.getDownloadURL = getDownloadURL;
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            background: #2A1A0E;
        }

        /* Fundo com imagem profissional de quadra Roland Garros */
        .roland-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.pexels.com/photos/1263121/tennis-court-red-clay-1263121.jpg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            background-position: center 40%;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .roland-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: -1;
        }

        /* Textura de saibro */
        .clay-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 25% 40%, rgba(200,100,40,0.15) 1px, transparent 1px);
            background-size: 35px 35px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px 100px 16px;
            position: relative;
            z-index: 2;
        }

        /* ===== HEADER ===== */
        .rg-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .rg-header h1 {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #FFB347;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .rg-header .sub {
            font-family: 'Roboto', sans-serif;
            font-size: 0.7rem;
            color: #E0B080;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== PRÓXIMO JOGO - DESTAQUE NO TOPO ===== */
        .next-match-card {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #D96C1A;
            text-align: center;
        }

        .next-match-title {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #FFB347;
            margin-bottom: 16px;
        }

        .next-match-players {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .next-player {
            text-align: center;
        }

        .next-player-photo {
            width: 80px;
            height: 80px;
            border-radius: 80px;
            object-fit: cover;
            border: 3px solid #D96C1A;
            background: #2A1A0E;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .next-player-name {
            margin-top: 10px;
            font-weight: 700;
            color: #FFF;
            font-size: 1rem;
        }

        .vs-divider {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: #D96C1A;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 40px;
        }

        .checkin-status {
            margin-top: 16px;
            font-size: 0.75rem;
            color: #CCC;
        }

        /* ===== CARDS COM ÍCONES SVG ===== */
        .card {
            background: rgba(30,22,16,0.88);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(217,108,26,0.4);
            transition: all 0.2s;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #FFB347;
            border-left: 3px solid #D96C1A;
            padding-left: 12px;
        }

        .card-header svg {
            width: 24px;
            height: 24px;
            fill: #D96C1A;
        }

        /* Botões com degrade saibro */
        .btn-clay {
            background: linear-gradient(135deg, #D96C1A, #A23F0A);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .btn-clay:active {
            transform: scale(0.97);
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #D96C1A;
            background: #2A2018;
            font-family: 'Roboto', sans-serif;
            color: #FFF;
            margin-bottom: 12px;
        }

        .ranking-item {
            background: #2A2018;
            border-radius: 40px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #D96C1A;
        }

        .loser-item {
            background: #3A2010;
            border-left-color: #FF6666;
        }

        .player-item {
            background: #2A2018;
            border-radius: 40px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-photo-sm {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            object-fit: cover;
        }

        .highlights-img {
            width: 100%;
            border-radius: 12px;
            margin-top: 12px;
            max-height: 200px;
            object-fit: cover;
        }

        .hidden { display: none; }

        /* Menu inferior */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px;
            border-top: 1px solid #D96C1A;
        }

        .menu-btn {
            background: transparent;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-family: 'Roboto', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            color: #BBB;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .menu-btn.active {
            color: #D96C1A;
        }

        .menu-btn i { font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="roland-bg"></div>
<div class="clay-texture"></div>

<div class="container">
    <div class="rg-header">
        <h1>QUARTETO TENÍSTICO</h1>
        <div class="sub">ROLAND GARROS • SAIBRO CLUB</div>
    </div>

    <!-- PRÓXIMO JOGO EM DESTAQUE -->
    <div class="next-match-card" id="next-match-card">
        <div class="next-match-title">🎾 PRÓXIMO DUELO 🎾</div>
        <div id="next-match-players-container" class="next-match-players">
            <div class="next-player">
                <div class="next-player-photo" style="background:#D96C1A20; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-user-circle" style="font-size:50px; color:#D96C1A;"></i>
                </div>
                <div class="next-player-name">Aguardando</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="next-player">
                <div class="next-player-photo" style="background:#D96C1A20; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-user-circle" style="font-size:50px; color:#D96C1A;"></i>
                </div>
                <div class="next-player-name">Aguardando</div>
            </div>
        </div>
        <div id="next-match-status" class="checkin-status">⏳ Aguardando check-ins...</div>
    </div>

    <div id="home-tab">
        <!-- Troféu Perdedores -->
        <div class="card">
            <div class="card-header">
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2Z" fill="#D96C1A"/></svg>
                TROFÉU PERDEDORES 🏆💀
            </div>
            <div id="losers-ranking"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="10" stroke="#D96C1A" stroke-width="2" fill="none"/><path d="M12 8v4l3 3" stroke="#D96C1A" stroke-width="2" fill="none"/></svg>
                Último Highlight
            </div>
            <img id="highlights-img" class="highlights-img" src="">
            <p id="highlights-desc" style="margin-top:10px; font-size:0.8rem; color:#CCC;"></p>
        </div>

        <div class="card">
            <div class="card-header">
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 12v8H4v-8M12 2v6M8 6l4-4 4 4" stroke="#D96C1A" stroke-width="2" fill="none"/></svg>
                Check-in da Rodada
            </div>
            <select id="checkin-player-select"></select>
            <button class="btn-clay" id="do-checkin">✅ Marcar Presença</button>
            <div id="checkin-list" style="margin-top:16px; font-size:0.8rem;"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <svg viewBox="0 0 24 24" width="24" height="24"><rect x="2" y="6" width="20" height="12" rx="2" stroke="#D96C1A" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="2" fill="#D96C1A"/></svg>
                Enviar Foto
            </div>
            <input type="file" id="match-photo" accept="image/*">
            <button class="btn-clay" id="upload-photo-btn">⭐ Destacar Momento</button>
        </div>
    </div>

    <div id="registro-tab" class="hidden">
        <div class="card">
            <div class="card-header">📋 Registrar Partida</div>
            <select id="match-type"><option value="simples">Simples</option><option value="duplas">Duplas</option></select>
            <select id="player1"></select><select id="player2"></select>
            <div id="duplas-fields" class="hidden"><select id="player3"></select><select id="player4"></select></div>
            <select id="winner-select"></select>
            <button class="btn-clay" id="save-match">Salvar Partida</button>
        </div>
    </div>

    <div id="rankings-tab" class="hidden">
        <div class="card"><div class="card-header">🏆 Ranking Simples</div><div id="ranking-simples"></div></div>
        <div class="card"><div class="card-header">👥 Ranking Duplas</div><div id="ranking-duplas"></div></div>
    </div>

    <div id="admin-tab" class="hidden">
        <div class="card">
            <div class="card-header">➕ Adicionar Jogador + Foto</div>
            <input type="text" id="new-player-name" placeholder="Nome">
            <input type="file" id="player-photo" accept="image/*">
            <div id="photo-preview"></div>
            <button class="btn-clay" id="add-player">Adicionar</button>
        </div>
        <div class="card">
            <div class="card-header">🗑️ Remover Jogador</div>
            <select id="delete-player-select"></select>
            <button class="btn-clay" id="delete-player">Remover</button>
        </div>
        <div class="card"><div class="card-header">📋 Membros</div><div id="players-list-admin"></div></div>
    </div>

    <div class="bottom-menu">
        <button class="menu-btn active" data-tab="home"><i class="fas fa-home"></i><span>Início</span></button>
        <button class="menu-btn" data-tab="registro"><i class="fas fa-plus-circle"></i><span>Registrar</span></button>
        <button class="menu-btn" data-tab="rankings"><i class="fas fa-trophy"></i><span>Ranking</span></button>
        <button class="menu-btn" data-tab="admin"><i class="fas fa-crown"></i><span>Admin</span></button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
