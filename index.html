<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quarteto Tenístico | Ranking Profissional</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
        }
        
        /* Fundo profissional com textura de saibro sutil */
        .clay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #D4A373 0%, #B8895A 100%);
            z-index: -2;
        }
        
        .clay-bg::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 40%, rgba(80, 50, 20, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 70% 85%, rgba(60, 40, 15, 0.1) 1px, transparent 1px);
            background-size: 35px 35px, 25px 25px;
            pointer-events: none;
        }
        
        .clay-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            pointer-events: none;
        }
        
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 20px 16px 90px 16px;
            position: relative;
            z-index: 2;
        }
        
        /* Header Premium */
        .header {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 24px 20px;
            margin-bottom: 24px;
            border-bottom: 3px solid #E67E22;
            text-align: center;
        }
        
        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 5px;
        }
        
        .header h1 {
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: #E67E22;
            margin-bottom: 5px;
        }
        
        .header .sub {
            font-family: 'Roboto', sans-serif;
            font-size: 0.7rem;
            color: #CCCCCC;
            letter-spacing: 1px;
        }
        
        /* Cards */
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(230,126,34,0.3);
        }
        
        .card-title {
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #E67E22;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid #E67E22;
            padding-left: 12px;
            text-transform: uppercase;
        }
        
        .card-title i { font-size: 1.1rem; color: #E67E22; }
        
        /* Próximo Duelo */
        .next-match-card {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #E67E22;
            text-align: center;
        }
        
        .next-match-title {
            font-family: 'Anton', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            color: #E67E22;
            margin-bottom: 15px;
        }
        
        .next-match-players {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .next-player {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 12px;
            min-width: 110px;
        }
        
        .next-player-img {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #E67E22;
            background: #2a2a2a;
            margin-bottom: 8px;
        }
        
        .next-player-name {
            font-weight: 700;
            color: #FFF;
            font-size: 0.85rem;
        }
        
        .vs-divider {
            font-family: 'Anton', sans-serif;
            font-size: 1.2rem;
            color: #E67E22;
            background: rgba(230,126,34,0.2);
            padding: 5px 15px;
            border-radius: 30px;
        }
        
        .match-date-info {
            margin-top: 10px;
            padding: 8px;
            background: rgba(230,126,34,0.15);
            border-radius: 8px;
            font-size: 0.75rem;
            color: #E67E22;
        }
        
        /* Botões */
        .btn-primary {
            background: #E67E22;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        
        .btn-primary:active { transform: scale(0.97); background: #D35400; }
        .btn-danger { background: #C0392B; }
        .btn-outline { background: transparent; border: 1px solid #E67E22; color: #E67E22; }
        
        input, select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #DDD;
            font-family: 'Roboto', sans-serif;
            margin-bottom: 12px;
        }
        
        input:focus, select:focus { outline: none; border-color: #E67E22; }
        
        .player-item, .match-item {
            background: #F5F5F5;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #E67E22;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #EEE;
            font-size: 0.9rem;
        }
        
        .score-set { text-align: center; margin: 12px 0; }
        .score-input { width: 65px; text-align: center; display: inline-block; margin: 0 5px; padding: 8px; border-radius: 8px; }
        
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            border-top: 1px solid #E67E22;
        }
        
        .menu-btn {
            background: transparent;
            border: none;
            text-align: center;
            color: #AAA;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 8px;
            font-family: 'Roboto', sans-serif;
        }
        
        .menu-btn.active { color: #E67E22; }
        .menu-btn i { font-size: 1.1rem; display: block; margin-bottom: 4px; }
        
        .hidden { display: none; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C2C2C;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }
        
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .photo-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin: 8px 0; border: 1px solid #E67E22; }
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #E0D0C0; }
        ::-webkit-scrollbar-thumb { background: #E67E22; border-radius: 4px; }
    </style>
</head>
<body>

<div class="clay-bg"></div>

<div class="container">
    <div class="header">
        <img src="quarteto tenistico.png" class="logo-img" onerror="this.style.display='none'">
        <h1>QUARTETO TENÍSTICO</h1>
        <div class="sub">SENDO RUIM EM MAIS UM ESPORTE</div>
    </div>

    <!-- PRÓXIMO DUELO -->
    <div class="next-match-card">
        <div class="next-match-title">🎾 PRÓXIMO DUELO</div>
        <div id="next-match-players" class="next-match-players">
            <div class="next-player">
                <div class="next-player-img"><i class="fas fa-user" style="font-size:35px; color:#888; line-height:65px;"></i></div>
                <div class="next-player-name">Aguardando</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="next-player">
                <div class="next-player-img"><i class="fas fa-user" style="font-size:35px; color:#888; line-height:65px;"></i></div>
                <div class="next-player-name">Aguardando</div>
            </div>
        </div>
        <div id="match-date-info" class="match-date-info"></div>
        <div id="next-match-status" style="margin-top: 10px; font-size:0.7rem; color:#E67E22;"></div>
    </div>

    <!-- HOME -->
    <div id="home-tab">
        <div class="card">
            <div class="card-title"><i class="fas fa-skull"></i> PERDEDOR DA RODADA</div>
            <select id="loser-select"></select>
            <button class="btn-primary" id="register-loser">HOSTILIZAR PERDEDOR</button>
            <div id="losers-list" style="margin-top: 15px;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-check-circle"></i> CHECK-IN</div>
            <select id="checkin-select"></select>
            <input type="date" id="checkin-date">
            <button class="btn-primary" id="do-checkin">CONFIRMAR PRESENÇA</button>
            <div id="checkins-list" style="margin-top: 15px; max-height: 150px; overflow-y: auto;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-camera"></i> HIGHLIGHT</div>
            <input type="file" id="photo-file" accept="image/*">
            <button class="btn-primary" id="upload-photo">DESTACAR MOMENTO</button>
            <img id="highlight-img" style="width: 100%; margin-top: 12px; border-radius: 8px; display: none;">
        </div>
    </div>

    <!-- PLACAR -->
    <div id="placar-tab" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-chalkboard"></i> REGISTRAR PARTIDA</div>
            <select id="match-type">
                <option value="simples">SIMPLES (2 jogadores)</option>
                <option value="duplas">DUPLAS (4 jogadores)</option>
            </select>
            
            <div id="simples-area">
                <select id="player1"></select>
                <select id="player2"></select>
            </div>
            
            <div id="duplas-area" class="hidden">
                <div class="flex-row">
                    <select id="dupla1" style="flex:1"></select>
                    <select id="dupla2" style="flex:1"></select>
                </div>
                <div class="flex-row">
                    <select id="dupla3" style="flex:1"></select>
                    <select id="dupla4" style="flex:1"></select>
                </div>
            </div>
            
            <div class="score-set"><span>1º SET:</span> <input type="number" id="set1a" class="score-input" min="0" max="7"> <span>x</span> <input type="number" id="set1b" class="score-input" min="0" max="7"></div>
            <div class="score-set"><span>2º SET:</span> <input type="number" id="set2a" class="score-input" min="0" max="7"> <span>x</span> <input type="number" id="set2b" class="score-input" min="0" max="7"></div>
            <div class="score-set"><span>3º SET:</span> <input type="number" id="set3a" class="score-input" min="0" max="7"> <span>x</span> <input type="number" id="set3b" class="score-input" min="0" max="7"></div>
            
            <button class="btn-primary" id="save-match">SALVAR PARTIDA</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-trash"></i> EXCLUIR RESULTADO</div>
            <select id="delete-match-select"></select>
            <button class="btn-primary btn-danger" id="delete-match">EXCLUIR PARTIDA</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-history"></i> ÚLTIMAS PARTIDAS</div>
            <div id="recent-matches" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- RANKING -->
    <div id="rankings-tab" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-trophy"></i> RANKING SIMPLES</div>
            <div id="ranking-simples"></div>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-users"></i> RANKING DUPLAS</div>
            <div id="ranking-duplas"></div>
        </div>
    </div>

    <!-- ADMIN -->
    <div id="admin-tab" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-user-plus"></i> ADICIONAR JOGADOR</div>
            <input type="text" id="player-name" placeholder="Nome completo">
            <input type="file" id="player-photo-file" accept="image/*">
            <div id="player-photo-preview"></div>
            <button class="btn-primary" id="add-player">ADICIONAR JOGADOR</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-user-minus"></i> REMOVER JOGADOR</div>
            <select id="remove-player-select"></select>
            <button class="btn-outline" id="remove-player">REMOVER JOGADOR</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-list"></i> MEMBROS</div>
            <div id="members-list" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="bottom-menu">
        <button class="menu-btn active" data-tab="home"><i class="fas fa-home"></i><span>Início</span></button>
        <button class="menu-btn" data-tab="placar"><i class="fas fa-chalkboard"></i><span>Placar</span></button>
        <button class="menu-btn" data-tab="rankings"><i class="fas fa-trophy"></i><span>Ranking</span></button>
        <button class="menu-btn" data-tab="admin"><i class="fas fa-crown"></i><span>Admin</span></button>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyC1HCA84bAsQWsf1y0c85gXZ2_Jn6_syaU",
    authDomain: "quartetotenistico-9c9ab.firebaseapp.com",
    databaseURL: "https://quartetotenistico-9c9ab-default-rtdb.firebaseio.com",
    projectId: "quartetotenistico-9c9ab",
    storageBucket: "quartetotenistico-9c9ab.firebasestorage.app",
    messagingSenderId: "791700433774",
    appId: "1:791700433774:web:ea08cc0ad6c1cc045fef7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

// Variáveis
let players = [];
let matches = [];
let checkins = [];
let losers = [];

function showToast(msg) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// Carregar Jogadores
async function loadPlayers() {
    try {
        const snapshot = await db.ref('players').once('value');
        players = [];
        snapshot.forEach(child => {
            players.push({ id: child.key, ...child.val() });
        });
        players.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
        console.log("Jogadores carregados:", players.length);
        updateAllSelects();
        updateMembersList();
        updateNextMatch();
    } catch (error) {
        console.error("Erro:", error);
        showToast("Erro ao carregar jogadores");
    }
}

async function loadMatches() {
    const snapshot = await db.ref('matches').once('value');
    matches = [];
    snapshot.forEach(child => { matches.push({ id: child.key, ...child.val() }); });
    matches.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
    updateRankings();
    updateRecentMatches();
    updateDeleteSelect();
}

async function loadCheckins() {
    const snapshot = await db.ref('checkins').once('value');
    checkins = [];
    snapshot.forEach(child => { checkins.push(child.val()); });
    checkins.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
    updateCheckinsList();
    updateNextMatch();
}

async function loadLosers() {
    const snapshot = await db.ref('losers').once('value');
    losers = [];
    snapshot.forEach(child => { losers.push({ id: child.key, ...child.val() }); });
    updateLosersList();
}

function updateAllSelects() {
    const selects = ["player1", "player2", "dupla1", "dupla2", "dupla3", "dupla4", 
                     "checkin-select", "loser-select", "remove-player-select", "delete-match-select"];
    selects.forEach(id => {
        const el = document.getElementById(id);
        if(el && el.tagName === 'SELECT') {
            el.innerHTML = '<option value="">Selecione</option>' + 
                players.map(p => `<option value="${p.id}">${p.name || '?'}</option>`).join('');
        }
    });
}

function updateMembersList() {
    const div = document.getElementById("members-list");
    if(players.length === 0) {
        div.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum jogador</div>';
    } else {
        div.innerHTML = players.map(p => `
            <div class="player-item">
                <div class="flex-row">
                    <img src="${p.photoUrl || 'https://via.placeholder.com/35'}" style="width:35px;height:35px;border-radius:8px;object-fit:cover;">
                    <span><strong>${p.name}</strong></span>
                </div>
            </div>
        `).join('');
    }
}

function updateNextMatch() {
    const hoje = new Date().toDateString();
    const checkinsHoje = checkins.filter(c => c.date && new Date(c.date).toDateString() === hoje);
    const ids = checkinsHoje.map(c => c.playerId);
    const confirmados = players.filter(p => ids.includes(p.id));
    
    const container = document.getElementById("next-match-players");
    const dateDiv = document.getElementById("match-date-info");
    const statusDiv = document.getElementById("next-match-status");
    
    if(checkinsHoje.length > 0 && checkinsHoje[0].date) {
        dateDiv.innerHTML = `📅 DATA: ${new Date(checkinsHoje[0].date).toLocaleDateString('pt-BR')}`;
    } else {
        dateDiv.innerHTML = '';
    }
    
    if(confirmados.length >= 2) {
        const p1 = confirmados[0], p2 = confirmados[1];
        container.innerHTML = `
            <div class="next-player">
                <img src="${p1.photoUrl || 'https://via.placeholder.com/65'}" class="next-player-img" onerror="this.src='https://via.placeholder.com/65'">
                <div class="next-player-name">${p1.name}</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="next-player">
                <img src="${p2.photoUrl || 'https://via.placeholder.com/65'}" class="next-player-img" onerror="this.src='https://via.placeholder.com/65'">
                <div class="next-player-name">${p2.name}</div>
            </div>
        `;
        statusDiv.innerHTML = `✅ ${confirmados.length} jogadores confirmados`;
    } else {
        container.innerHTML = `
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user" style="font-size:35px; color:#888; line-height:65px;"></i></div><div class="next-player-name">Aguardando</div></div>
            <div class="vs-divider">VS</div>
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user" style="font-size:35px; color:#888; line-height:65px;"></i></div><div class="next-player-name">Aguardando</div></div>
        `;
        statusDiv.innerHTML = `⏳ Aguardando check-ins (${confirmados.length}/2)`;
    }
}

function updateLosersList() {
    const count = {};
    losers.forEach(l => { count[l.playerId] = (count[l.playerId] || 0) + 1; });
    const sorted = Object.entries(count).sort((a,b) => b[1] - a[1]).slice(0,5);
    const div = document.getElementById("losers-list");
    if(sorted.length === 0) {
        div.innerHTML = "<div style='text-align:center;'>Nenhum perdedor</div>";
    } else {
        div.innerHTML = sorted.map(([id, c]) => {
            const p = players.find(p => p.id === id);
            return `<div class="player-item">💀 ${p?.name || '?'} - 🍂 ${c} vez(es)</div>`;
        }).join('');
    }
}

function updateCheckinsList() {
    const div = document.getElementById("checkins-list");
    const recentes = checkins.slice(0, 10);
    if(recentes.length === 0) {
        div.innerHTML = "Nenhum check-in";
    } else {
        div.innerHTML = recentes.map(c => {
            const p = players.find(p => p.id === c.playerId);
            const data = c.date ? new Date(c.date).toLocaleDateString() : 'Data?';
            return `<div class="player-item" style="padding:8px;">📅 ${data} - ${p?.name || '?'}</div>`;
        }).join('');
    }
}

function updateRecentMatches() {
    const div = document.getElementById("recent-matches");
    const recentes = matches.slice(0, 15);
    if(recentes.length === 0) {
        div.innerHTML = "<div style='text-align:center; padding:20px;'>Nenhuma partida</div>";
    } else {
        div.innerHTML = recentes.map(m => {
            const winners = m.winners?.map(w => players.find(p => p.id === w)?.name).join("/") || '?';
            const losers = m.losers?.map(l => players.find(p => p.id === l)?.name).join("/") || '?';
            const data = m.date ? new Date(m.date).toLocaleDateString() : 'Data?';
            return `<div class="match-item"><div><strong>${winners}</strong> venceu <strong>${losers}</strong></div><div style="font-size:0.7rem;">${m.result || 'Placar'} - ${data}</div></div>`;
        }).join('');
    }
}

function updateDeleteSelect() {
    const sel = document.getElementById("delete-match-select");
    if(sel) {
        sel.innerHTML = '<option value="">Selecione</option>' + 
            matches.slice(0, 30).map(m => {
                const winners = m.winners?.map(w => players.find(p => p.id === w)?.name).join("/");
                const losers = m.losers?.map(l => players.find(p => p.id === l)?.name).join("/");
                const data = m.date ? new Date(m.date).toLocaleDateString() : '';
                return `<option value="${m.id}">${data} - ${winners} x ${losers}</option>`;
            }).join('');
    }
}

function updateRankings() {
    const stats = {};
    players.forEach(p => { stats[p.id] = { jogos: 0, vitorias: 0, derrotas: 0 }; });
    
    matches.forEach(m => {
        if(m.winners) { m.winners.forEach(w => { if(stats[w]) { stats[w].jogos++; stats[w].vitorias++; } }); }
        if(m.losers) { m.losers.forEach(l => { if(stats[l]) { stats[l].jogos++; stats[l].derrotas++; } }); }
    });
    
    const sorted = Object.entries(stats).sort((a,b) => b[1].vitorias - a[1].vitorias);
    const divSimples = document.getElementById("ranking-simples");
    if(sorted.length === 0) {
        divSimples.innerHTML = "<div style='text-align:center; padding:20px;'>Nenhuma partida</div>";
    } else {
        divSimples.innerHTML = sorted.map(([id, s]) => {
            const p = players.find(p => p.id === id);
            const perc = s.jogos > 0 ? ((s.vitorias/s.jogos)*100).toFixed(0) : 0;
            return `<div class="ranking-item"><span><strong>${p?.name || '?'}</strong></span><span>🏆 ${s.vitorias}V | ${s.derrotas}D (${perc}%)</span></div>`;
        }).join('');
    }
    
    const duplaWins = {};
    matches.forEach(m => {
        if(m.type === "duplas" && m.winners && m.winners.length === 2) {
            const key = [m.winners[0], m.winners[1]].sort().join("_");
            duplaWins[key] = (duplaWins[key] || 0) + 1;
        }
    });
    const divDuplas = document.getElementById("ranking-duplas");
    const sortedDuplas = Object.entries(duplaWins).sort((a,b) => b[1] - a[1]);
    if(sortedDuplas.length === 0) {
        divDuplas.innerHTML = "<div style='text-align:center; padding:20px;'>Nenhuma dupla</div>";
    } else {
        divDuplas.innerHTML = sortedDuplas.map(([key, wins]) => {
            const ids = key.split("_");
            const p1 = players.find(p => p.id === ids[0]);
            const p2 = players.find(p => p.id === ids[1]);
            return `<div class="ranking-item"><span>${p1?.name || '?'} / ${p2?.name || '?'}</span><span>🏆 ${wins}</span></div>`;
        }).join('');
    }
}

// Ações Principais
async function addNewPlayer() {
    const name = document.getElementById("player-name").value.trim();
    const file = document.getElementById("player-photo-file").files[0];
    
    if(!name) { showToast("Digite o nome do jogador"); return; }
    
    showToast("Adicionando jogador...");
    
    try {
        let photoUrl = null;
        if(file) {
            const storageRef = storage.ref(`players/${Date.now()}_${file.name}`);
            await storageRef.put(file);
            photoUrl = await storageRef.getDownloadURL();
        }
        
        await db.ref('players').push({ name: name, photoUrl: photoUrl, createdAt: new Date().toISOString() });
        
        showToast(`✅ Jogador ${name} adicionado!`);
        document.getElementById("player-name").value = "";
        document.getElementById("player-photo-file").value = "";
        document.getElementById("player-photo-preview").innerHTML = "";
        await loadPlayers();
    } catch (error) {
        console.error(error);
        showToast("Erro: " + error.message);
    }
}

async function removePlayer() {
    const id = document.getElementById("remove-player-select").value;
    if(!id) { showToast("Selecione um jogador"); return; }
    try {
        await db.ref(`players/${id}`).remove();
        showToast("✅ Jogador removido");
        await loadPlayers();
    } catch (error) { showToast("Erro: " + error.message); }
}

async function addLoser() {
    const id = document.getElementById("loser-select").value;
    if(!id) { showToast("Selecione o perdedor"); return; }
    try {
        await db.ref('losers').push({ playerId: id, date: new Date().toISOString(), timestamp: Date.now() });
        showToast("💀 Perdedor hostilizado!");
        await loadLosers();
    } catch (error) { showToast("Erro: " + error.message); }
}

async function addCheckin() {
    const playerId = document.getElementById("checkin-select").value;
    const date = document.getElementById("checkin-date").value;
    if(!playerId) { showToast("Selecione um jogador"); return; }
    if(!date) { showToast("Selecione a data"); return; }
    try {
        await db.ref('checkins').push({ playerId: playerId, date: date, timestamp: Date.now() });
        showToast(`✅ Check-in para ${new Date(date).toLocaleDateString()}`);
        await loadCheckins();
    } catch (error) { showToast("Erro: " + error.message); }
}

async function saveMatch() {
    const type = document.getElementById("match-type").value;
    let winners = [], losers = [], playersList = [];
    
    if(type === "simples") {
        const p1 = document.getElementById("player1").value;
        const p2 = document.getElementById("player2").value;
        if(!p1 || !p2) { showToast("Selecione os jogadores"); return; }
        if(p1 === p2) { showToast("Jogadores diferentes"); return; }
        
        const s1a = parseInt(document.getElementById("set1a").value) || 0;
        const s1b = parseInt(document.getElementById("set1b").value) || 0;
        const s2a = parseInt(document.getElementById("set2a").value) || 0;
        const s2b = parseInt(document.getElementById("set2b").value) || 0;
        const s3a = parseInt(document.getElementById("set3a").value) || 0;
        const s3b = parseInt(document.getElementById("set3b").value) || 0;
        
        let setsP1 = 0, setsP2 = 0;
        if(s1a > s1b) setsP1++; else if(s1b > s1a) setsP2++;
        if(s2a > s2b) setsP1++; else if(s2b > s2a) setsP2++;
        if(s3a > s3b) setsP1++; else if(s3b > s3a) setsP2++;
        
        if(setsP1 > setsP2) { winners = [p1]; losers = [p2]; }
        else if(setsP2 > setsP1) { winners = [p2]; losers = [p1]; }
        else { showToast("Empate!"); return; }
        playersList = [p1, p2];
    } else {
        const a1 = document.getElementById("dupla1").value;
        const a2 = document.getElementById("dupla2").value;
        const b1 = document.getElementById("dupla3").value;
        const b2 = document.getElementById("dupla4").value;
        if(!a1 || !a2 || !b1 || !b2) { showToast("Selecione todos os 4 jogadores"); return; }
        
        const s1a = parseInt(document.getElementById("set1a").value) || 0;
        const s1b = parseInt(document.getElementById("set1b").value) || 0;
        const s2a = parseInt(document.getElementById("set2a").value) || 0;
        const s2b = parseInt(document.getElementById("set2b").value) || 0;
        const s3a = parseInt(document.getElementById("set3a").value) || 0;
        const s3b = parseInt(document.getElementById("set3b").value) || 0;
        
        let setsA = 0, setsB = 0;
        if(s1a > s1b) setsA++; else if(s1b > s1a) setsB++;
        if(s2a > s2b) setsA++; else if(s2b > s2a) setsB++;
        if(s3a > s3b) setsA++; else if(s3b > s3a) setsB++;
        
        if(setsA > setsB) { winners = [a1, a2]; losers = [b1, b2]; }
        else if(setsB > setsA) { winners = [b1, b2]; losers = [a1, a2]; }
        else { showToast("Empate!"); return; }
        playersList = [a1, a2, b1, b2];
    }
    
    const sets = [];
    if(document.getElementById("set1a").value) sets.push(`${document.getElementById("set1a").value}/${document.getElementById("set1b").value}`);
    if(document.getElementById("set2a").value) sets.push(`${document.getElementById("set2a").value}/${document.getElementById("set2b").value}`);
    if(document.getElementById("set3a").value) sets.push(`${document.getElementById("set3a").value}/${document.getElementById("set3b").value}`);
    const result = sets.join(" • ");
    
    try {
        await db.ref('matches').push({ type, players: playersList, winners, losers, result, date: new Date().toISOString(), timestamp: Date.now() });
        showToast("🎾 Partida registrada!");
        document.getElementById("set1a").value = ""; document.getElementById("set1b").value = "";
        document.getElementById("set2a").value = ""; document.getElementById("set2b").value = "";
        document.getElementById("set3a").value = ""; document.getElementById("set3b").value = "";
        await loadMatches();
    } catch (error) { showToast("Erro: " + error.message); }
}

async function deleteMatch() {
    const id = document.getElementById("delete-match-select").value;
    if(!id) { showToast("Selecione uma partida"); return; }
    try {
        await db.ref(`matches/${id}`).remove();
        showToast("✅ Partida excluída");
        await loadMatches();
    } catch (error) { showToast("Erro: " + error.message); }
}

async function uploadPhoto() {
    const file = document.getElementById("photo-file").files[0];
    if(!file) { showToast("Selecione uma foto"); return; }
    try {
        const storageRef = storage.ref(`highlights/${Date.now()}_${file.name}`);
        await storageRef.put(file);
        const url = await storageRef.getDownloadURL();
        await db.ref('highlights').push({ url: url, timestamp: Date.now() });
        document.getElementById("highlight-img").src = url;
        document.getElementById("highlight-img").style.display = "block";
        showToast("✨ Foto destacada!");
    } catch (error) { showToast("Erro: " + error.message); }
}

// Preview
document.getElementById("player-photo-file").addEventListener("change", (e) => {
    if(e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => { document.getElementById("player-photo-preview").innerHTML = `<img src="${ev.target.result}" class="photo-preview">`; };
        reader.readAsDataURL(e.target.files[0]);
    }
});

// Tabs
function setupTabs() {
    const btns = document.querySelectorAll(".menu-btn");
    const tabs = ["home-tab", "placar-tab", "rankings-tab", "admin-tab"];
    btns.forEach((btn, idx) => {
        btn.onclick = () => {
            btns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            tabs.forEach(t => document.getElementById(t).classList.add("hidden"));
            document.getElementById(tabs[idx]).classList.remove("hidden");
        };
    });
}

function bindEvents() {
    document.getElementById("add-player").onclick = addNewPlayer;
    document.getElementById("remove-player").onclick = removePlayer;
    document.getElementById("register-loser").onclick = addLoser;
    document.getElementById("do-checkin").onclick = addCheckin;
    document.getElementById("save-match").onclick = saveMatch;
    document.getElementById("delete-match").onclick = deleteMatch;
    document.getElementById("upload-photo").onclick = uploadPhoto;
    document.getElementById("match-type").onchange = () => {
        const isDuplas = document.getElementById("match-type").value === "duplas";
        document.getElementById("simples-area").classList.toggle("hidden", isDuplas);
        document.getElementById("duplas-area").classList.toggle("hidden", !isDuplas);
    };
}

document.addEventListener("DOMContentLoaded", async () => {
    setupTabs();
    bindEvents();
    document.getElementById("checkin-date").value = new Date().toISOString().split('T')[0];
    await loadPlayers();
    await loadMatches();
    await loadCheckins();
    await loadLosers();
});
</script>
