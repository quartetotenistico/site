<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quarteto Tenístico</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
        }
        
        .clay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #B87A3A 0%, #8B5A2B 100%);
            z-index: -2;
        }
        
        .clay-bg::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 25% 40%, rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .clay-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 90px 16px;
            position: relative;
            z-index: 2;
        }
        
        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 3px solid #E67E22;
        }
        
        .logo-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .header h1 {
            font-family: 'Anton', sans-serif;
            font-size: 1.8rem;
            color: #E67E22;
            letter-spacing: 1px;
        }
        
        .header .sub {
            font-size: 0.7rem;
            color: #CCC;
        }
        
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
        }
        
        .card-title {
            font-weight: 700;
            color: #E67E22;
            margin-bottom: 15px;
            border-left: 3px solid #E67E22;
            padding-left: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .next-match-card {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid #E67E22;
            text-align: center;
        }
        
        .next-match-title {
            font-family: 'Anton', sans-serif;
            font-size: 0.9rem;
            color: #E67E22;
            margin-bottom: 15px;
        }
        
        .next-match-players {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .next-player {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 10px;
            min-width: 100px;
        }
        
        .next-player-img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            border: 1px solid #E67E22;
        }
        
        .next-player-name {
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .vs-divider {
            font-family: 'Anton', sans-serif;
            color: #E67E22;
            font-size: 1rem;
        }
        
        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #DDD;
            margin-bottom: 10px;
            font-family: 'Roboto', sans-serif;
        }
        
        button {
            background: #E67E22;
            border: none;
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            font-family: 'Roboto', sans-serif;
        }
        
        button:active { transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #E67E22; color: #E67E22; }
        .btn-danger { background: #C0392B; }
        
        .player-item {
            background: #F5F5F5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #EEE;
            font-size: 0.85rem;
        }
        
        .score-set { text-align: center; margin: 10px 0; }
        .score-input { width: 60px; text-align: center; margin: 0 5px; padding: 8px; }
        
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 1px solid #E67E22;
        }
        
        .menu-btn {
            background: transparent;
            border: none;
            color: #AAA;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 5px;
        }
        
        .menu-btn.active { color: #E67E22; }
        .menu-btn i { font-size: 1.1rem; display: block; margin-bottom: 4px; }
        
        .hidden { display: none; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }
        
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .flex-row { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="clay-bg"></div>

<div class="container">
    <div class="header">
        <img src="quarteto tenistico.png" class="logo-img" onerror="this.style.display='none'">
        <h1>QUARTETO TENÍSTICO</h1>
        <div class="sub">SENDO RUIM EM MAIS UM ESPORTE</div>
    </div>

    <div class="next-match-card">
        <div class="next-match-title">PRÓXIMO DUELO</div>
        <div id="next-match-players" class="next-match-players">
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user" style="color:#888;"></i></div><div class="next-player-name">Aguardando</div></div>
            <div class="vs-divider">VS</div>
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user" style="color:#888;"></i></div><div class="next-player-name">Aguardando</div></div>
        </div>
        <div id="next-match-status" style="margin-top:10px; font-size:0.7rem; color:#E67E22;"></div>
    </div>

    <div id="home-tab">
        <div class="card">
            <div class="card-title"><i class="fas fa-skull"></i> PERDEDOR DA RODADA</div>
            <select id="loser-select"></select>
            <button id="register-loser">HOSTILIZAR</button>
            <div id="losers-list" style="margin-top:12px;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-check-circle"></i> CHECK-IN</div>
            <select id="checkin-select"></select>
            <input type="date" id="checkin-date">
            <button id="do-checkin">CONFIRMAR</button>
            <div id="checkins-list" style="margin-top:12px;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-camera"></i> DESTAQUE</div>
            <input type="file" id="photo-file">
            <button id="upload-photo">ENVIAR FOTO</button>
            <img id="highlight-img" style="width:100%; margin-top:10px; border-radius:8px; display:none;">
        </div>
    </div>

    <div id="placar-tab" class="hidden">
        <div class="card">
            <div class="card-title">REGISTRAR PARTIDA</div>
            <select id="match-type">
                <option value="simples">SIMPLES</option>
                <option value="duplas">DUPLAS</option>
            </select>
            <div id="simples-area">
                <select id="player1"></select>
                <select id="player2"></select>
            </div>
            <div id="duplas-area" class="hidden">
                <select id="dupla1"></select><select id="dupla2"></select>
                <select id="dupla3"></select><select id="dupla4"></select>
            </div>
            <div class="score-set"><span>1º SET:</span> <input type="number" id="set1a" class="score-input" min="0" max="7"> x <input type="number" id="set1b" class="score-input" min="0" max="7"></div>
            <div class="score-set"><span>2º SET:</span> <input type="number" id="set2a" class="score-input" min="0" max="7"> x <input type="number" id="set2b" class="score-input" min="0" max="7"></div>
            <div class="score-set"><span>3º SET:</span> <input type="number" id="set3a" class="score-input" min="0" max="7"> x <input type="number" id="set3b" class="score-input" min="0" max="7"></div>
            <button id="save-match">SALVAR</button>
        </div>
        
        <div class="card">
            <div class="card-title">EXCLUIR RESULTADO</div>
            <select id="delete-match-select"></select>
            <button id="delete-match" class="btn-danger">EXCLUIR</button>
        </div>
        
        <div class="card">
            <div class="card-title">ÚLTIMAS PARTIDAS</div>
            <div id="recent-matches"></div>
        </div>
    </div>

    <div id="rankings-tab" class="hidden">
        <div class="card"><div class="card-title">RANKING SIMPLES</div><div id="ranking-simples"></div></div>
        <div class="card"><div class="card-title">RANKING DUPLAS</div><div id="ranking-duplas"></div></div>
    </div>

    <div id="admin-tab" class="hidden">
        <div class="card">
            <div class="card-title">ADICIONAR JOGADOR</div>
            <input type="text" id="player-name" placeholder="Nome do jogador">
            <button id="add-player">ADICIONAR</button>
        </div>
        <div class="card">
            <div class="card-title">REMOVER JOGADOR</div>
            <select id="remove-player-select"></select>
            <button id="remove-player" class="btn-outline">REMOVER</button>
        </div>
        <div class="card">
            <div class="card-title">MEMBROS</div>
            <div id="members-list"></div>
        </div>
    </div>

    <div class="bottom-menu">
        <button class="menu-btn active" data-tab="home"><i class="fas fa-home"></i><span>Início</span></button>
        <button class="menu-btn" data-tab="placar"><i class="fas fa-chalkboard"></i><span>Placar</span></button>
        <button class="menu-btn" data-tab="rankings"><i class="fas fa-trophy"></i><span>Ranking</span></button>
        <button class="menu-btn" data-tab="admin"><i class="fas fa-crown"></i><span>Admin</span></button>
    </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyC1HCA84bAsQWsf1y0c85gXZ2_Jn6_syaU",
    authDomain: "quartetotenistico-9c9ab.firebaseapp.com",
    databaseURL: "https://quartetotenistico-9c9ab-default-rtdb.firebaseio.com",
    projectId: "quartetotenistico-9c9ab",
    storageBucket: "quartetotenistico-9c9ab.firebasestorage.app",
    messagingSenderId: "791700433774",
    appId: "1:791700433774:web:ea08cc0ad6c1cc045fef7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let players = [];
let matches = [];
let checkins = [];
let losers = [];

function showToast(msg) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// CARREGAR
async function loadPlayers() {
    const snapshot = await db.ref('players').once('value');
    players = [];
    snapshot.forEach(child => { players.push({ id: child.key, ...child.val() }); });
    players.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
    updateSelects();
    document.getElementById("members-list").innerHTML = players.map(p => `<div class="player-item"><span>${p.name}</span></div>`).join('');
    if(players.length === 0) document.getElementById("members-list").innerHTML = '<div style="text-align:center; padding:20px;">Nenhum jogador</div>';
}

async function loadMatches() {
    const snapshot = await db.ref('matches').once('value');
    matches = [];
    snapshot.forEach(child => { matches.push({ id: child.key, ...child.val() }); });
    updateRankings();
}

async function loadCheckins() {
    const snapshot = await db.ref('checkins').once('value');
    checkins = [];
    snapshot.forEach(child => { checkins.push(child.val()); });
    updateNextMatch();
}

async function loadLosers() {
    const snapshot = await db.ref('losers').once('value');
    losers = [];
    snapshot.forEach(child => { losers.push({ id: child.key, ...child.val() }); });
    const count = {};
    losers.forEach(l => { count[l.playerId] = (count[l.playerId] || 0) + 1; });
    const sorted = Object.entries(count).sort((a,b) => b[1] - a[1]).slice(0,5);
    document.getElementById("losers-list").innerHTML = sorted.map(([id,c]) => {
        const p = players.find(p => p.id === id);
        return `<div class="player-item">💀 ${p?.name || '?'} - ${c}x</div>`;
    }).join('') || '<div style="text-align:center;">Nenhum perdedor</div>';
}

function updateSelects() {
    const selects = ["player1","player2","dupla1","dupla2","dupla3","dupla4","checkin-select","loser-select","remove-player-select","delete-match-select"];
    selects.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.innerHTML = '<option value="">Selecione</option>' + players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    });
}

function updateNextMatch() {
    const hoje = new Date().toDateString();
    const checkinsHoje = checkins.filter(c => c.date && new Date(c.date).toDateString() === hoje);
    const ids = checkinsHoje.map(c => c.playerId);
    const confirmados = players.filter(p => ids.includes(p.id));
    const container = document.getElementById("next-match-players");
    const status = document.getElementById("next-match-status");
    
    if(confirmados.length >= 2) {
        container.innerHTML = `
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user"></i></div><div class="next-player-name">${confirmados[0].name}</div></div>
            <div class="vs-divider">VS</div>
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user"></i></div><div class="next-player-name">${confirmados[1].name}</div></div>
        `;
        status.innerHTML = `✅ ${confirmados.length} jogadores confirmados`;
    } else {
        container.innerHTML = `
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user"></i></div><div class="next-player-name">Aguardando</div></div>
            <div class="vs-divider">VS</div>
            <div class="next-player"><div class="next-player-img"><i class="fas fa-user"></i></div><div class="next-player-name">Aguardando</div></div>
        `;
        status.innerHTML = `⏳ Aguardando (${confirmados.length}/2)`;
    }
}

function updateRankings() {
    const stats = {};
    players.forEach(p => { stats[p.id] = { jogos: 0, vitorias: 0 }; });
    matches.forEach(m => {
        if(m.winners) m.winners.forEach(w => { if(stats[w]) { stats[w].jogos++; stats[w].vitorias++; } });
        if(m.losers) m.losers.forEach(l => { if(stats[l]) stats[l].jogos++; });
    });
    const sorted = Object.entries(stats).sort((a,b) => b[1].vitorias - a[1].vitorias);
    document.getElementById("ranking-simples").innerHTML = sorted.map(([id,s]) => {
        const p = players.find(p => p.id === id);
        return `<div class="ranking-item"><span>${p?.name || '?'}</span><span>🏆 ${s.vitorias}V | ${s.jogos-s.vitorias}D</span></div>`;
    }).join('') || '<div style="text-align:center;">Nenhuma partida</div>';
    
    // Duplas
    const duplaWins = {};
    matches.forEach(m => {
        if(m.type === "duplas" && m.winners?.length === 2) {
            const key = [m.winners[0], m.winners[1]].sort().join("_");
            duplaWins[key] = (duplaWins[key] || 0) + 1;
        }
    });
    const sortedDuplas = Object.entries(duplaWins).sort((a,b) => b[1] - a[1]);
    document.getElementById("ranking-duplas").innerHTML = sortedDuplas.map(([key,wins]) => {
        const ids = key.split("_");
        const p1 = players.find(p => p.id === ids[0]);
        const p2 = players.find(p => p.id === ids[1]);
        return `<div class="ranking-item"><span>${p1?.name}/${p2?.name}</span><span>🏆 ${wins}</span></div>`;
    }).join('') || '<div style="text-align:center;">Nenhuma dupla</div>';
}

// AÇÕES
async function addPlayer() {
    const name = document.getElementById("player-name").value.trim();
    if(!name) { showToast("Digite o nome"); return; }
    await db.ref('players').push({ name: name });
    showToast(`✅ ${name} adicionado!`);
    document.getElementById("player-name").value = "";
    await loadPlayers();
}

async function removePlayer() {
    const id = document.getElementById("remove-player-select").value;
    if(!id) { showToast("Selecione um jogador"); return; }
    await db.ref(`players/${id}`).remove();
    showToast("Jogador removido");
    await loadPlayers();
}

async function addLoser() {
    const id = document.getElementById("loser-select").value;
    if(!id) { showToast("Selecione o perdedor"); return; }
    await db.ref('losers').push({ playerId: id, timestamp: Date.now() });
    showToast("💀 Perdedor hostilizado!");
    await loadLosers();
}

async function addCheckin() {
    const id = document.getElementById("checkin-select").value;
    const date = document.getElementById("checkin-date").value;
    if(!id) { showToast("Selecione um jogador"); return; }
    if(!date) { showToast("Selecione a data"); return; }
    await db.ref('checkins').push({ playerId: id, date: date });
    showToast(`✅ Check-in registrado`);
    await loadCheckins();
}

async function saveMatch() {
    const type = document.getElementById("match-type").value;
    let winners = [], losers = [];
    
    if(type === "simples") {
        const p1 = document.getElementById("player1").value;
        const p2 = document.getElementById("player2").value;
        if(!p1 || !p2) { showToast("Selecione os jogadores"); return; }
        const s1a = parseInt(document.getElementById("set1a").value) || 0;
        const s1b = parseInt(document.getElementById("set1b").value) || 0;
        const s2a = parseInt(document.getElementById("set2a").value) || 0;
        const s2b = parseInt(document.getElementById("set2b").value) || 0;
        const s3a = parseInt(document.getElementById("set3a").value) || 0;
        const s3b = parseInt(document.getElementById("set3b").value) || 0;
        let setsP1=0, setsP2=0;
        if(s1a>s1b) setsP1++; else if(s1b>s1a) setsP2++;
        if(s2a>s2b) setsP1++; else if(s2b>s2a) setsP2++;
        if(s3a>s3b) setsP1++; else if(s3b>s3a) setsP2++;
        if(setsP1 > setsP2) { winners=[p1]; losers=[p2]; }
        else if(setsP2 > setsP1) { winners=[p2]; losers=[p1]; }
        else { showToast("Empate!"); return; }
    } else {
        const a1 = document.getElementById("dupla1").value;
        const a2 = document.getElementById("dupla2").value;
        const b1 = document.getElementById("dupla3").value;
        const b2 = document.getElementById("dupla4").value;
        if(!a1||!a2||!b1||!b2) { showToast("Selecione todos"); return; }
        const s1a = parseInt(document.getElementById("set1a").value) || 0;
        const s1b = parseInt(document.getElementById("set1b").value) || 0;
        const s2a = parseInt(document.getElementById("set2a").value) || 0;
        const s2b = parseInt(document.getElementById("set2b").value) || 0;
        const s3a = parseInt(document.getElementById("set3a").value) || 0;
        const s3b = parseInt(document.getElementById("set3b").value) || 0;
        let setsA=0, setsB=0;
        if(s1a>s1b) setsA++; else if(s1b>s1a) setsB++;
        if(s2a>s2b) setsA++; else if(s2b>s2a) setsB++;
        if(s3a>s3b) setsA++; else if(s3b>s3a) setsB++;
        if(setsA > setsB) { winners=[a1,a2]; losers=[b1,b2]; }
        else if(setsB > setsA) { winners=[b1,b2]; losers=[a1,a2]; }
        else { showToast("Empate!"); return; }
    }
    
    await db.ref('matches').push({ type, winners, losers, date: new Date().toISOString(), timestamp: Date.now() });
    showToast("🎾 Partida registrada!");
    await loadMatches();
}

// TABS
function setupTabs() {
    const btns = document.querySelectorAll(".menu-btn");
    const tabs = ["home-tab","placar-tab","rankings-tab","admin-tab"];
    btns.forEach((btn, idx) => {
        btn.onclick = () => {
            btns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            tabs.forEach(t => document.getElementById(t).classList.add("hidden"));
            document.getElementById(tabs[idx]).classList.remove("hidden");
        };
    });
}

function bindEvents() {
    document.getElementById("add-player").onclick = addPlayer;
    document.getElementById("remove-player").onclick = removePlayer;
    document.getElementById("register-loser").onclick = addLoser;
    document.getElementById("do-checkin").onclick = addCheckin;
    document.getElementById("save-match").onclick = saveMatch;
    document.getElementById("match-type").onchange = () => {
        const isDuplas = document.getElementById("match-type").value === "duplas";
        document.getElementById("simples-area").classList.toggle("hidden", isDuplas);
        document.getElementById("duplas-area").classList.toggle("hidden", !isDuplas);
    };
}

document.addEventListener("DOMContentLoaded", async () => {
    setupTabs();
    bindEvents();
    document.getElementById("checkin-date").value = new Date().toISOString().split('T')[0];
    await loadPlayers();
    await loadMatches();
    await loadCheckins();
    await loadLosers();
});
