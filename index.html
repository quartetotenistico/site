<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quarteto Tenístico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #FFF8F0; padding-bottom: 80px; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        
        .header {
            text-align: center;
            background: linear-gradient(135deg, #F47B20, #D96C1A);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            color: white;
        }
        
        .header h1 { font-size: 1.5rem; }
        .header p { font-size: 0.8rem; opacity: 0.9; }
        
        .logo-img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            background: white; 
            border-radius: 50%; 
            margin-bottom: 10px;
            padding: 5px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #F47B20;
            margin-bottom: 16px;
            border-left: 3px solid #F47B20;
            padding-left: 10px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        
        button {
            background: #F47B20;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        button:active { transform: scale(0.98); background: #D96C1A; }
        
        .btn-outline { background: transparent; border: 2px solid #F47B20; color: #F47B20; }
        .btn-danger { background: #D32F2F; }
        
        .player-item, .match-item {
            background: #FFF8F0;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #F0E0D0;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 2px solid #F47B20;
        }
        
        .menu-btn {
            background: transparent;
            border: none;
            text-align: center;
            color: #888;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 8px;
        }
        
        .menu-btn.active { color: #F47B20; }
        .menu-btn i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        
        .hidden { display: none; }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 1000;
        }
        
        .flex-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .score-input { width: 70px; text-align: center; display: inline-block; margin: 0 5px; padding: 8px; }
        .score-set { text-align: center; margin: 10px 0; }
        
        .next-match-players { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .next-player { text-align: center; }
        .next-player-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #F47B20; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="quarteto tenistico.png" class="logo-img" onerror="this.style.display='none'">
        <h1>QUARTETO TENÍSTICO</h1>
        <p>SENDO RUIM EM MAIS UM ESPORTE</p>
    </div>

    <!-- HOME -->
    <div id="home-tab">
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar"></i> Próximo Duelo</div>
            <div id="next-match" style="text-align: center;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-skull"></i> Perdedor da Rodada</div>
            <select id="loser-select"></select>
            <button id="register-loser">💀 Hostilizar Perdedor</button>
            <div id="losers-list" style="margin-top: 12px;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-check-circle"></i> Check-in</div>
            <select id="checkin-select"></select>
            <input type="date" id="checkin-date">
            <button id="do-checkin">✅ Marcar Presença</button>
            <div id="checkins-list" style="margin-top: 12px;"></div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-camera"></i> Enviar Foto</div>
            <input type="file" id="photo-file">
            <button id="upload-photo">⭐ Destacar Momento</button>
            <img id="highlight-img" style="width: 100%; margin-top: 10px; border-radius: 10px; display: none;">
        </div>
    </div>

    <!-- PLACAR -->
    <div id="placar-tab" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-chalkboard"></i> Marcar Placar</div>
            
            <select id="match-type">
                <option value="simples">Simples (2 jogadores)</option>
                <option value="duplas">Duplas (4 jogadores)</option>
            </select>
            
            <div id="simples-area">
                <select id="player1"></select>
                <select id="player2"></select>
            </div>
            
            <div id="duplas-area" class="hidden">
                <div class="flex-row" style="gap: 8px;">
                    <select id="dupla1" style="flex:1"></select>
                    <select id="dupla2" style="flex:1"></select>
                </div>
                <div class="flex-row" style="gap: 8px;">
                    <select id="dupla3" style="flex:1"></select>
                    <select id="dupla4" style="flex:1"></select>
                </div>
            </div>
            
            <div class="score-set">
                <span>1º SET:</span>
                <input type="number" id="set1a" class="score-input" placeholder="A" min="0" max="7">
                <span>x</span>
                <input type="number" id="set1b" class="score-input" placeholder="B" min="0" max="7">
            </div>
            <div class="score-set">
                <span>2º SET:</span>
                <input type="number" id="set2a" class="score-input" placeholder="A" min="0" max="7">
                <span>x</span>
                <input type="number" id="set2b" class="score-input" placeholder="B" min="0" max="7">
            </div>
            <div class="score-set">
                <span>3º SET:</span>
                <input type="number" id="set3a" class="score-input" placeholder="A" min="0" max="7">
                <span>x</span>
                <input type="number" id="set3b" class="score-input" placeholder="B" min="0" max="7">
            </div>
            
            <button id="save-match">📝 Salvar Partida</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-trash"></i> Excluir Resultado</div>
            <select id="delete-match-select"></select>
            <button id="delete-match" class="btn-danger">🗑️ Excluir</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-history"></i> Últimas Partidas</div>
            <div id="recent-matches"></div>
        </div>
    </div>

    <!-- RANKING -->
    <div id="rankings-tab" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-trophy"></i> Ranking Simples (Vitórias)</div>
            <div id="ranking-simples"></div>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-users"></i> Ranking Duplas</div>
            <div id="ranking-duplas"></div>
        </div>
    </div>

    <!-- ADMIN -->
    <div id="admin-tab" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-user-plus"></i> Adicionar Jogador</div>
            <input type="text" id="player-name" placeholder="Nome do jogador">
            <button id="add-player">✅ Adicionar Jogador</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-user-minus"></i> Remover Jogador</div>
            <select id="remove-player-select"></select>
            <button id="remove-player" class="btn-outline">❌ Remover</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-list"></i> Membros do Clube</div>
            <div id="members-list"></div>
        </div>
    </div>

    <div class="bottom-menu">
        <button class="menu-btn active" data-tab="home"><i class="fas fa-home"></i><span>Início</span></button>
        <button class="menu-btn" data-tab="placar"><i class="fas fa-chalkboard"></i><span>Placar</span></button>
        <button class="menu-btn" data-tab="rankings"><i class="fas fa-trophy"></i><span>Ranking</span></button>
        <button class="menu-btn" data-tab="admin"><i class="fas fa-crown"></i><span>Admin</span></button>
    </div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyC1HCA84bAsQWsf1y0c85gXZ2_Jn6_syaU",
    authDomain: "quartetotenistico-9c9ab.firebaseapp.com",
    databaseURL: "https://quartetotenistico-9c9ab-default-rtdb.firebaseio.com",
    projectId: "quartetotenistico-9c9ab",
    storageBucket: "quartetotenistico-9c9ab.firebasestorage.app",
    messagingSenderId: "791700433774",
    appId: "1:791700433774:web:ea08cc0ad6c1cc045fef7f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ==================== VARIÁVEIS ====================
let players = [];
let matches = [];
let checkins = [];
let losers = [];

// ==================== FUNÇÕES ====================
function showToast(msg) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// CARREGAR JOGADORES
async function loadPlayers() {
    const snapshot = await db.ref('players').once('value');
    players = [];
    snapshot.forEach(child => {
        players.push({ id: child.key, ...child.val() });
    });
    players.sort((a,b) => a.name.localeCompare(b.name));
    console.log("Jogadores carregados:", players.length);
    updateAllSelects();
    updateMembersList();
    updateNextMatch();
}

// CARREGAR PARTIDAS
async function loadMatches() {
    const snapshot = await db.ref('matches').once('value');
    matches = [];
    snapshot.forEach(child => {
        matches.push({ id: child.key, ...child.val() });
    });
    matches.sort((a,b) => b.timestamp - a.timestamp);
    updateRankings();
    updateRecentMatches();
    updateDeleteSelect();
}

// CARREGAR CHECKINS
async function loadCheckins() {
    const snapshot = await db.ref('checkins').once('value');
    checkins = [];
    snapshot.forEach(child => {
        checkins.push(child.val());
    });
    checkins.sort((a,b) => b.timestamp - a.timestamp);
    updateCheckinsList();
    updateNextMatch();
}

// CARREGAR PERDEDORES
async function loadLosers() {
    const snapshot = await db.ref('losers').once('value');
    losers = [];
    snapshot.forEach(child => {
        losers.push({ id: child.key, ...child.val() });
    });
    losers.sort((a,b) => b.timestamp - a.timestamp);
    updateLosersList();
}

// ATUALIZAR SELECTS
function updateAllSelects() {
    const selects = ["player1", "player2", "dupla1", "dupla2", "dupla3", "dupla4", 
                     "checkin-select", "loser-select", "remove-player-select", "delete-match-select"];
    
    selects.forEach(id => {
        const el = document.getElementById(id);
        if(el && el.tagName === 'SELECT') {
            el.innerHTML = '<option value="">Selecione</option>' + 
                players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }
    });
}

// ATUALIZAR LISTA DE MEMBROS
function updateMembersList() {
    const div = document.getElementById("members-list");
    if(players.length === 0) {
        div.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">Nenhum jogador cadastrado</div>';
    } else {
        div.innerHTML = players.map(p => `
            <div class="player-item">
                <span><i class="fas fa-user-circle"></i> ${p.name}</span>
                <small style="color:#999;">${p.id?.substring(0,6)}</small>
            </div>
        `).join('');
    }
}

// ATUALIZAR RANKINGS
function updateRankings() {
    const stats = {};
    players.forEach(p => { stats[p.id] = { jogos: 0, vitorias: 0, derrotas: 0 }; });
    
    matches.forEach(m => {
        if(m.winners) {
            m.winners.forEach(w => { 
                if(stats[w]) { stats[w].jogos++; stats[w].vitorias++; }
            });
        }
        if(m.losers) {
            m.losers.forEach(l => { 
                if(stats[l]) { stats[l].jogos++; stats[l].derrotas++; }
            });
        }
    });
    
    const sorted = Object.entries(stats).sort((a,b) => b[1].vitorias - a[1].vitorias);
    const divSimples = document.getElementById("ranking-simples");
    if(sorted.length === 0) {
        divSimples.innerHTML = "<div style='text-align:center; padding:20px;'>Nenhuma partida</div>";
    } else {
        divSimples.innerHTML = sorted.map(([id, s]) => {
            const p = players.find(p => p.id === id);
            const perc = s.jogos > 0 ? ((s.vitorias/s.jogos)*100).toFixed(0) : 0;
            return `<div class="ranking-item">
                        <span><strong>${p?.name || "?"}</strong></span>
                        <span>🏆 ${s.vitorias}V | ${s.derrotas}D (${perc}%)</span>
                    </div>`;
        }).join('');
    }
    
    // Ranking duplas
    const duplaWins = {};
    matches.forEach(m => {
        if(m.type === "duplas" && m.winners && m.winners.length === 2) {
            const key = [m.winners[0], m.winners[1]].sort().join("_");
            duplaWins[key] = (duplaWins[key] || 0) + 1;
        }
    });
    const divDuplas = document.getElementById("ranking-duplas");
    const sortedDuplas = Object.entries(duplaWins).sort((a,b) => b[1] - a[1]);
    if(sortedDuplas.length === 0) {
        divDuplas.innerHTML = "<div style='text-align:center; padding:20px;'>Nenhuma dupla</div>";
    } else {
        divDuplas.innerHTML = sortedDuplas.map(([key, wins]) => {
            const ids = key.split("_");
            const p1 = players.find(p => p.id === ids[0]);
            const p2 = players.find(p => p.id === ids[1]);
            return `<div class="ranking-item">
                        <span>${p1?.name || "?"} / ${p2?.name || "?"}</span>
                        <span>🏆 ${wins} título(s)</span>
                    </div>`;
        }).join('');
    }
}

// ATUALIZAR PRÓXIMO JOGO
function updateNextMatch() {
    const hoje = new Date().toDateString();
    const checkinsHoje = checkins.filter(c => {
        if(!c.date) return false;
        return new Date(c.date).toDateString() === hoje;
    });
    const ids = checkinsHoje.map(c => c.playerId);
    const confirmados = players.filter(p => ids.includes(p.id));
    
    const div = document.getElementById("next-match");
    if(confirmados.length >= 2) {
        div.innerHTML = `
            <div class="next-match-players">
                <div class="next-player">
                    <div><strong>${confirmados[0].name}</strong></div>
                </div>
                <div style="font-size:1.5rem; color:#F47B20;">VS</div>
                <div class="next-player">
                    <div><strong>${confirmados[1].name}</strong></div>
                </div>
            </div>
            <div style="margin-top:10px; color:#2E7D32;">✅ ${confirmados.length} jogadores confirmados</div>
        `;
    } else {
        div.innerHTML = `⏳ Aguardando check-ins... (${confirmados.length}/2)`;
    }
}

// ATUALIZAR LISTA DE PERDEDORES
function updateLosersList() {
    const count = {};
    losers.forEach(l => { count[l.playerId] = (count[l.playerId] || 0) + 1; });
    const sorted = Object.entries(count).sort((a,b) => b[1] - a[1]).slice(0,5);
    const div = document.getElementById("losers-list");
    if(sorted.length === 0) {
        div.innerHTML = "<div style='text-align:center;'>Nenhum perdedor ainda</div>";
    } else {
        div.innerHTML = sorted.map(([id, c]) => {
            const p = players.find(p => p.id === id);
            return `<div class="player-item">💀 ${p?.name} - 🍂 ${c} vez(es)</div>`;
        }).join('');
    }
}

// ATUALIZAR CHECKINS
function updateCheckinsList() {
    const div = document.getElementById("checkins-list");
    const recentes = checkins.slice(0, 10);
    if(recentes.length === 0) {
        div.innerHTML = "Nenhum check-in ainda";
    } else {
        div.innerHTML = recentes.map(c => {
            const p = players.find(p => p.id === c.playerId);
            const data = c.date ? new Date(c.date).toLocaleDateString() : 'Data?';
            return `<div>📅 ${data} - ${p?.name || "?"}</div>`;
        }).join('');
    }
}

// ATUALIZAR PARTIDAS RECENTES
function updateRecentMatches() {
    const div = document.getElementById("recent-matches");
    const recentes = matches.slice(0, 15);
    if(recentes.length === 0) {
        div.innerHTML = "<div style='text-align:center; padding:20px;'>Nenhuma partida</div>";
    } else {
        div.innerHTML = recentes.map(m => {
            const winners = m.winners?.map(w => players.find(p => p.id === w)?.name).join("/");
            const losers = m.losers?.map(l => players.find(p => p.id === l)?.name).join("/");
            const data = m.date ? new Date(m.date).toLocaleDateString() : 'Data?';
            return `<div class="match-item">
                        <div><strong>${winners}</strong> venceu <strong>${losers}</strong></div>
                        <div style="font-size:0.7rem; color:#D96C1A;">${m.result || "Placar"} - ${data}</div>
                    </div>`;
        }).join('');
    }
}

// ATUALIZAR SELECT DE EXCLUSÃO
function updateDeleteSelect() {
    const sel = document.getElementById("delete-match-select");
    if(sel) {
        sel.innerHTML = '<option value="">Selecione uma partida</option>' + 
            matches.slice(0, 30).map(m => {
                const winners = m.winners?.map(w => players.find(p => p.id === w)?.name).join("/");
                const losers = m.losers?.map(l => players.find(p => p.id === l)?.name).join("/");
                const data = m.date ? new Date(m.date).toLocaleDateString() : '';
                return `<option value="${m.id}">${data} - ${winners} x ${losers}</option>`;
            }).join('');
    }
}

// ==================== AÇÕES ====================
// ADICIONAR JOGADOR
async function addNewPlayer() {
    const name = document.getElementById("player-name").value.trim();
    
    if(!name) {
        showToast("Digite o nome do jogador");
        return;
    }
    
    showToast("Adicionando...");
    
    try {
        const newRef = db.ref('players').push();
        await newRef.set({
            name: name,
            createdAt: new Date().toISOString()
        });
        
        showToast(`✅ Jogador ${name} adicionado!`);
        document.getElementById("player-name").value = "";
        await loadPlayers();
    } catch (error) {
        console.error(error);
        showToast("Erro: " + error.message);
    }
}

// REMOVER JOGADOR
async function removePlayer() {
    const id = document.getElementById("remove-player-select").value;
    if(!id) {
        showToast("Selecione um jogador");
        return;
    }
    try {
        await db.ref(`players/${id}`).remove();
        showToast("✅ Jogador removido");
        await loadPlayers();
    } catch (error) {
        showToast("Erro: " + error.message);
    }
}

// REGISTRAR PERDEDOR
async function addLoser() {
    const id = document.getElementById("loser-select").value;
    if(!id) {
        showToast("Selecione o perdedor");
        return;
    }
    try {
        await db.ref('losers').push({
            playerId: id,
            date: new Date().toISOString(),
            timestamp: Date.now()
        });
        showToast("💀 Perdedor hostilizado!");
        await loadLosers();
    } catch (error) {
        showToast("Erro: " + error.message);
    }
}

// FAZER CHECKIN
async function addCheckin() {
    const playerId = document.getElementById("checkin-select").value;
    const date = document.getElementById("checkin-date").value;
    
    if(!playerId) {
        showToast("Selecione um jogador");
        return;
    }
    if(!date) {
        showToast("Selecione a data");
        return;
    }
    
    try {
        await db.ref('checkins').push({
            playerId: playerId,
            date: date,
            timestamp: Date.now()
        });
        showToast(`✅ Check-in para ${new Date(date).toLocaleDateString()}`);
        await loadCheckins();
    } catch (error) {
        showToast("Erro: " + error.message);
    }
}

// SALVAR PARTIDA
async function saveMatch() {
    const type = document.getElementById("match-type").value;
    
    let winners = [], losers = [], playersList = [];
    
    if(type === "simples") {
        const p1 = document.getElementById("player1").value;
        const p2 = document.getElementById("player2").value;
        if(!p1 || !p2) { showToast("Selecione os jogadores"); return; }
        if(p1 === p2) { showToast("Jogadores diferentes"); return; }
        
        const s1a = parseInt(document.getElementById("set1a").value) || 0;
        const s1b = parseInt(document.getElementById("set1b").value) || 0;
        const s2a = parseInt(document.getElementById("set2a").value) || 0;
        const s2b = parseInt(document.getElementById("set2b").value) || 0;
        const s3a = parseInt(document.getElementById("set3a").value) || 0;
        const s3b = parseInt(document.getElementById("set3b").value) || 0;
        
        let setsP1 = 0, setsP2 = 0;
        if(s1a > s1b) setsP1++; else if(s1b > s1a) setsP2++;
        if(s2a > s2b) setsP1++; else if(s2b > s2a) setsP2++;
        if(s3a > s3b) setsP1++; else if(s3b > s3a) setsP2++;
        
        if(setsP1 > setsP2) { winners = [p1]; losers = [p2]; }
        else if(setsP2 > setsP1) { winners = [p2]; losers = [p1]; }
        else { showToast("Empate! Verifique os sets"); return; }
        
        playersList = [p1, p2];
    } else {
        const a1 = document.getElementById("dupla1").value;
        const a2 = document.getElementById("dupla2").value;
        const b1 = document.getElementById("dupla3").value;
        const b2 = document.getElementById("dupla4").value;
        if(!a1 || !a2 || !b1 || !b2) { showToast("Selecione todos os 4 jogadores"); return; }
        
        const s1a = parseInt(document.getElementById("set1a").value) || 0;
        const s1b = parseInt(document.getElementById("set1b").value) || 0;
        const s2a = parseInt(document.getElementById("set2a").value) || 0;
        const s2b = parseInt(document.getElementById("set2b").value) || 0;
        const s3a = parseInt(document.getElementById("set3a").value) || 0;
        const s3b = parseInt(document.getElementById("set3b").value) || 0;
        
        let setsA = 0, setsB = 0;
        if(s1a > s1b) setsA++; else if(s1b > s1a) setsB++;
        if(s2a > s2b) setsA++; else if(s2b > s2a) setsB++;
        if(s3a > s3b) setsA++; else if(s3b > s3a) setsB++;
        
        if(setsA > setsB) { winners = [a1, a2]; losers = [b1, b2]; }
        else if(setsB > setsA) { winners = [b1, b2]; losers = [a1, a2]; }
        else { showToast("Empate!"); return; }
        
        playersList = [a1, a2, b1, b2];
    }
    
    const sets = [];
    if(document.getElementById("set1a").value) sets.push(`${document.getElementById("set1a").value}/${document.getElementById("set1b").value}`);
    if(document.getElementById("set2a").value) sets.push(`${document.getElementById("set2a").value}/${document.getElementById("set2b").value}`);
    if(document.getElementById("set3a").value) sets.push(`${document.getElementById("set3a").value}/${document.getElementById("set3b").value}`);
    const result = sets.join(" • ");
    
    try {
        await db.ref('matches').push({
            type: type,
            players: playersList,
            winners: winners,
            losers: losers,
            result: result,
            date: new Date().toISOString(),
            timestamp: Date.now()
        });
        showToast("🎾 Partida registrada!");
        
        document.getElementById("set1a").value = "";
        document.getElementById("set1b").value = "";
        document.getElementById("set2a").value = "";
        document.getElementById("set2b").value = "";
        document.getElementById("set3a").value = "";
        document.getElementById("set3b").value = "";
        
        await loadMatches();
    } catch (error) {
        showToast("Erro: " + error.message);
    }
}

// EXCLUIR PARTIDA
async function deleteMatch() {
    const id = document.getElementById("delete-match-select").value;
    if(!id) {
        showToast("Selecione uma partida");
        return;
    }
    try {
        await db.ref(`matches/${id}`).remove();
        showToast("✅ Partida excluída");
        await loadMatches();
    } catch (error) {
        showToast("Erro: " + error.message);
    }
}

// ENVIAR FOTO
async function uploadPhoto() {
    showToast("Função de foto será implementada em breve");
}

// ==================== TABS ====================
function setupTabs() {
    const btns = document.querySelectorAll(".menu-btn");
    const tabs = ["home-tab", "placar-tab", "rankings-tab", "admin-tab"];
    btns.forEach((btn, idx) => {
        btn.onclick = () => {
            btns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            tabs.forEach(t => document.getElementById(t).classList.add("hidden"));
            document.getElementById(tabs[idx]).classList.remove("hidden");
        };
    });
}

// ==================== EVENTOS ====================
function bindEvents() {
    document.getElementById("add-player").onclick = addNewPlayer;
    document.getElementById("remove-player").onclick = removePlayer;
    document.getElementById("register-loser").onclick = addLoser;
    document.getElementById("do-checkin").onclick = addCheckin;
    document.getElementById("save-match").onclick = saveMatch;
    document.getElementById("delete-match").onclick = deleteMatch;
    document.getElementById("upload-photo").onclick = uploadPhoto;
    
    document.getElementById("match-type").onchange = () => {
        const isDuplas = document.getElementById("match-type").value === "duplas";
        document.getElementById("simples-area").classList.toggle("hidden", isDuplas);
        document.getElementById("duplas-area").classList.toggle("hidden", !isDuplas);
    };
}

// ==================== INICIALIZAÇÃO ====================
document.addEventListener("DOMContentLoaded", async () => {
    console.log("🚀 Iniciando aplicação...");
    setupTabs();
    bindEvents();
    
    document.getElementById("checkin-date").value = new Date().toISOString().split('T')[0];
    
    await loadPlayers();
    await loadMatches();
    await loadCheckins();
    await loadLosers();
    
    console.log("✅ Aplicação pronta!");
});
</script>
